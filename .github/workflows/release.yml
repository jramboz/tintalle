name: Build and publish release

on:
  push:
    tags:
      - "v*.*.*"

  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/release.yml"
      - "app.py"
      - "requirements.txt"
      - "build-requirements.txt"
      - "tintalle-win.spec"
      - "tintalle-linux.spec"
      - "tintalle-mac.spec"
      - "tintalle.iss"
      - ".bumpversion.cfg"
      - "version_compare.py"
      - "update_checker.py"
      - "tests/**"
      - "packaging/linux/**"
      - "packaging/macos/**"
      - "translations/**"
      - "img/**"
      - "OpenCore_OEM/**"

  workflow_dispatch:
    inputs:
      version:
        description: >
          Version to build without the leading v. Leave empty to use
          script_version from app.py.
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify release
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    outputs:
      version: ${{ steps.release-version.outputs.version }}
      tag: ${{ steps.release-version.outputs.tag }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Check Python syntax
        run: |
          python -m compileall -q \
            app.py \
            version_compare.py \
            update_checker.py \
            tests

      - name: Validate release version
        id: release-version
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          REQUESTED_VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path


          def extract_version(
              filename: str,
              pattern: str,
              description: str,
          ) -> str:
              content = Path(filename).read_text(encoding="utf-8")
              match = re.search(pattern, content, re.MULTILINE)

              if match is None:
                  raise SystemExit(
                      f"Unable to find {description} in {filename}."
                  )

              return match.group(1)


          app_version = extract_version(
              "app.py",
              r"^script_version\s*=\s*['\"]([^'\"]+)['\"]",
              "script_version",
          )

          installer_version = extract_version(
              "tintalle.iss",
              r'^#define\s+MyAppVersion\s+"([^"]+)"',
              "MyAppVersion",
          )

          mac_version = extract_version(
              "tintalle-mac.spec",
              r'["\']CFBundleShortVersionString["\']\s*:\s*'
              r'["\']([^"\']+)["\']',
              "CFBundleShortVersionString",
          )

          bumpversion_version = extract_version(
              ".bumpversion.cfg",
              r"^current_version\s*=\s*(\S+)",
              "current_version",
          )

          event_name = os.environ["EVENT_NAME"]
          ref_name = os.environ["REF_NAME"]
          requested_version = os.environ.get(
              "REQUESTED_VERSION",
              "",
          ).strip()

          if event_name == "push":
              expected_version = ref_name.removeprefix("v")
          elif event_name == "workflow_dispatch" and requested_version:
              expected_version = requested_version.removeprefix("v")
          else:
              expected_version = app_version

          if re.fullmatch(
              r"[0-9]+\.[0-9]+\.[0-9]+",
              expected_version,
          ) is None:
              raise SystemExit(
                  "Release versions must use the X.Y.Z format. "
                  f"Received: {expected_version!r}"
              )

          version_locations = {
              "app.py": app_version,
              "tintalle.iss": installer_version,
              "tintalle-mac.spec": mac_version,
              ".bumpversion.cfg": bumpversion_version,
          }

          mismatches = {
              filename: version
              for filename, version in version_locations.items()
              if version != expected_version
          }

          if mismatches:
              details = "\n".join(
                  f"  {filename}: {version}"
                  for filename, version in mismatches.items()
              )

              raise SystemExit(
                  f"Expected release version {expected_version}, "
                  "but found mismatches:\n"
                  f"{details}"
              )

          output_file = Path(os.environ["GITHUB_OUTPUT"])

          with output_file.open("a", encoding="utf-8") as output:
              output.write(f"version={expected_version}\n")
              output.write(f"tag=v{expected_version}\n")

          print(f"Release version validated: {expected_version}")
          PY

  build-linux:
    name: Build Debian package
    needs:
      - verify

    runs-on: ubuntu-22.04
    timeout-minutes: 30

    env:
      DEBFULLNAME: ${{ vars.DEBFULLNAME }}
      DEBEMAIL: ${{ vars.DEBEMAIL }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            build-requirements.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            file \
            lintian \
            patchelf \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-render-util0

      - name: Install Python build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r build-requirements.txt

      - name: Build PyInstaller distribution
        run: |
          pyinstaller \
            --clean \
            --noconfirm \
            tintalle-linux.spec

      - name: Build Debian package
        env:
          RELEASE_VERSION: ${{ needs.verify.outputs.version }}
        shell: bash
        run: |
          DEBIAN_VERSION="${RELEASE_VERSION}-1"

          ./packaging/linux/build-deb.sh "${DEBIAN_VERSION}"

      - name: Run Lintian
        run: lintian dist-packages/*.deb

      - name: Upload Linux release asset
        uses: actions/upload-artifact@v6
        with:
          name: release-linux
          path: dist-packages/*.deb
          if-no-files-found: error
          retention-days: 14

  build-windows:
    name: Build Windows installer
    needs:
      - verify

    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            build-requirements.txt

      - name: Install Python build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r build-requirements.txt

      - name: Build PyInstaller distribution
        shell: pwsh
        run: |
          pyinstaller `
            --clean `
            --noconfirm `
            tintalle-win.spec

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --yes --no-progress

      - name: Build Windows installer
        shell: pwsh
        run: |
          $iscc = (
              "${env:ProgramFiles(x86)}" +
              "\Inno Setup 6\ISCC.exe"
          )

          if (-not (Test-Path $iscc)) {
              throw "Inno Setup compiler was not found at: $iscc"
          }

          & $iscc "tintalle.iss"

          if ($LASTEXITCODE -ne 0) {
              throw (
                  "Inno Setup failed with exit code " +
                  "$LASTEXITCODE"
              )
          }

      - name: Verify Windows installer
        env:
          RELEASE_VERSION: ${{ needs.verify.outputs.version }}
        shell: pwsh
        run: |
          $installer = (
              "dist\tintalle-" +
              $env:RELEASE_VERSION +
              ".exe"
          )

          if (-not (Test-Path $installer)) {
              throw "Expected installer was not found: $installer"
          }

          Write-Host "Windows installer generated: $installer"

      - name: Upload Windows release asset
        uses: actions/upload-artifact@v6
        with:
          name: release-windows
          path: >-
            dist/tintalle-${{
              needs.verify.outputs.version
            }}.exe
          if-no-files-found: error
          retention-days: 14

  build-macos:
    name: Build signed and notarized macOS application
    if: >
      (github.event_name == 'push' &&
       startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' &&
       github.ref == 'refs/heads/main')
    needs:
      - verify
    runs-on: macos-15-intel
    timeout-minutes: 90

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            build-requirements.txt

      - name: Validate macOS signing secrets
        env:
          MACOS_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
          MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        shell: bash
        run: |
          required_variables=(
            MACOS_CERTIFICATE_BASE64
            MACOS_CERTIFICATE_PASSWORD
            MACOS_KEYCHAIN_PASSWORD
            MACOS_CODESIGN_IDENTITY
            APPLE_ID
            APPLE_APP_SPECIFIC_PASSWORD
            APPLE_TEAM_ID
          )

          for variable in "${required_variables[@]}"; do
            if [[ -z "${!variable:-}" ]]; then
              echo "::error::Missing required secret: ${variable}"
              exit 1
            fi
          done

      - name: Install Developer ID certificate
        env:
          MACOS_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
          MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
        shell: bash
        run: |
          CERTIFICATE_PATH="${RUNNER_TEMP}/developer-id-application.p12"
          KEYCHAIN_PATH="${RUNNER_TEMP}/app-signing.keychain-db"

          echo "CERTIFICATE_PATH=${CERTIFICATE_PATH}" >> "${GITHUB_ENV}"
          echo "KEYCHAIN_PATH=${KEYCHAIN_PATH}" >> "${GITHUB_ENV}"

          printf '%s' "${MACOS_CERTIFICATE_BASE64}" |
            base64 --decode -o "${CERTIFICATE_PATH}"

          security create-keychain \
            -p "${MACOS_KEYCHAIN_PASSWORD}" \
            "${KEYCHAIN_PATH}"

          security set-keychain-settings \
            -lut 21600 \
            "${KEYCHAIN_PATH}"

          security unlock-keychain \
            -p "${MACOS_KEYCHAIN_PASSWORD}" \
            "${KEYCHAIN_PATH}"

          security import "${CERTIFICATE_PATH}" \
            -P "${MACOS_CERTIFICATE_PASSWORD}" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "${KEYCHAIN_PATH}"

          security set-key-partition-list \
            -S apple-tool:,apple: \
            -k "${MACOS_KEYCHAIN_PASSWORD}" \
            "${KEYCHAIN_PATH}"

          security list-keychain \
            -d user \
            -s "${KEYCHAIN_PATH}"

          security find-identity \
            -v \
            -p codesigning \
            "${KEYCHAIN_PATH}"

          security find-identity \
            -v \
            -p codesigning \
            "${KEYCHAIN_PATH}" |
            grep -F -- "${MACOS_CODESIGN_IDENTITY}"

      - name: Install Python build dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r build-requirements.txt

      - name: Build signed macOS application
        env:
          MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
        shell: bash
        run: |
          pyinstaller \
            --clean \
            --noconfirm \
            tintalle-mac.spec

      - name: Verify Universal2 architectures
        shell: bash
        run: |
          ./packaging/macos/verify-universal2.sh \
            dist/Tintalle.app

      - name: Verify Developer ID signature
        shell: bash
        run: |
          codesign \
            --verify \
            --deep \
            --strict \
            --verbose=2 \
            dist/Tintalle.app

          codesign \
            --display \
            --verbose=4 \
            dist/Tintalle.app 2>&1

      - name: Create notarization archive
        shell: bash
        run: |
          ditto \
            -c \
            -k \
            --sequesterRsrc \
            --keepParent \
            dist/Tintalle.app \
            "${RUNNER_TEMP}/Tintalle-notarization.zip"

      - name: Submit application for notarization
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        shell: bash
        run: |
          xcrun notarytool submit \
            "${RUNNER_TEMP}/Tintalle-notarization.zip" \
            --apple-id "${APPLE_ID}" \
            --password "${APPLE_APP_SPECIFIC_PASSWORD}" \
            --team-id "${APPLE_TEAM_ID}" \
            --wait

      - name: Staple and validate notarization ticket
        shell: bash
        run: |
          xcrun stapler staple dist/Tintalle.app
          xcrun stapler validate dist/Tintalle.app

          codesign \
            --verify \
            --deep \
            --strict \
            --verbose=2 \
            dist/Tintalle.app

          spctl \
            --assess \
            --type execute \
            --verbose=4 \
            dist/Tintalle.app

      - name: Create final macOS release archive
        env:
          RELEASE_VERSION: ${{ needs.verify.outputs.version }}
        shell: bash
        run: |
          ditto \
            -c \
            -k \
            --sequesterRsrc \
            --keepParent \
            dist/Tintalle.app \
            "dist/Tintalle-${RELEASE_VERSION}-macos-universal2.zip"

      - name: Upload macOS release asset
        uses: actions/upload-artifact@v6
        with:
          name: release-macos
          path: >-
            dist/Tintalle-${{ needs.verify.outputs.version }}-macos-universal2.zip
          if-no-files-found: error
          retention-days: 14

      - name: Clean up signing files
        if: always()
        shell: bash
        run: |
          if [[ -n "${KEYCHAIN_PATH:-}" ]]; then
            security delete-keychain "${KEYCHAIN_PATH}" || true
          fi

          if [[ -n "${CERTIFICATE_PATH:-}" ]]; then
            rm -f "${CERTIFICATE_PATH}"
          fi

          rm -f "${RUNNER_TEMP}/Tintalle-notarization.zip"

  bundle:
    name: Prepare release assets
    if: >
      always() &&
      needs.build-linux.result == 'success' &&
      needs.build-windows.result == 'success' &&
      (needs.build-macos.result == 'success' ||
       needs.build-macos.result == 'skipped')
    needs:
      - build-linux
      - build-windows
      - build-macos

    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - name: Download Linux asset
        uses: actions/download-artifact@v8
        with:
          name: release-linux
          path: release-assets

      - name: Download Windows asset
        uses: actions/download-artifact@v8
        with:
          name: release-windows
          path: release-assets

      - name: Download macOS asset
        if: needs.build-macos.result == 'success'
        uses: actions/download-artifact@v8
        with:
          name: release-macos
          path: release-assets

      - name: Generate checksums
        shell: bash
        run: |
          cd release-assets

          mapfile -d '' release_files < <(
              find . \
                  -maxdepth 1 \
                  -type f \
                  ! -name "SHA256SUMS" \
                  -print0 |
                  sort -z
          )

          if [[ "${#release_files[@]}" -eq 0 ]]; then
              echo "No release files were generated." >&2
              exit 1
          fi

          sha256sum "${release_files[@]}" > SHA256SUMS

          echo "Release assets:"
          ls -lh

          echo
          echo "Checksums:"
          cat SHA256SUMS

      - name: Upload complete release bundle
        uses: actions/upload-artifact@v6
        with:
          name: release-assets
          path: release-assets/*
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish GitHub release

    if: >
      github.event_name == 'push' &&
      startsWith(github.ref, 'refs/tags/v')

    needs:
      - verify
      - bundle

    runs-on: ubuntu-22.04
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      - name: Download release bundle
        uses: actions/download-artifact@v8
        with:
          name: release-assets
          path: release-assets

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.verify.outputs.tag }}
          RELEASE_VERSION: ${{ needs.verify.outputs.version }}
        shell: bash
        run: |
          mapfile -d '' release_files < <(
              find release-assets \
                  -maxdepth 1 \
                  -type f \
                  -print0 |
                  sort -z
          )

          if [[ "${#release_files[@]}" -eq 0 ]]; then
              echo "No release assets were found." >&2
              exit 1
          fi

          gh release create "${RELEASE_TAG}" \
              "${release_files[@]}" \
              --verify-tag \
              --generate-notes \
              --title "Tintallë ${RELEASE_VERSION}"
